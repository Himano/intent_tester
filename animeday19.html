<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anime ranking</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: #181c2f;
      --text: #f3f5ff;
      --muted: #aeb6d9;
      --accent: #8db4ff;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b0e19 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      width: min(920px, calc(100% - 20px));
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 0 calc(28px + env(safe-area-inset-bottom));
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.5rem, 4vw, 2.3rem);
    }
    .sub {
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .toolbar button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .item {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
      align-items: center;
      background: rgba(24,28,47,0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .move-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #252b49;
      color: var(--text);
      border-radius: 12px;
      width: 42px;
      height: 42px;
      font-size: 20px;
      font-weight: 700;
    }
    .move-btn:disabled {
      opacity: 0.35;
    }
    .content {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: grid;
      font: inherit;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
      min-width: 0;
      padding: 0;
      text-align: left;
      width: 100%;
    }
    .content:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 5px;
    }
    .rank {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .title {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .thumb {
      display: block;
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hint {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
    }
    body.modal-open {
      overflow: hidden;
    }
    .modal[hidden] {
      display: none;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      align-items: end;
      justify-items: center;
      padding: 16px;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(6,8,18,0.78);
      backdrop-filter: blur(6px);
    }
    .modal-panel {
      position: relative;
      z-index: 1;
      width: min(520px, 100%);
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.45);
      padding: 18px;
    }
    .rating-control {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }
    .rating-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .rating-value {
      color: var(--accent);
      font-size: 1.5rem;
      font-weight: 800;
    }
    .rating-control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .modal-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 16px;
    }
    .modal-entry {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .modal-thumb {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }
    .modal-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.25;
    }
    .close-btn {
      appearance: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #252b49;
      color: var(--text);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
    }
    .note-field {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
    }
    .note-field textarea {
      min-height: 130px;
      resize: vertical;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font: inherit;
      line-height: 1.45;
      padding: 12px;
    }
    .note-field textarea:focus,
    .close-btn:focus-visible,
    .done-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .done-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #252b49;
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 10px 16px;
    }
    @media (min-width: 700px) {
      .item { grid-template-columns: 54px 1fr; }
      .content { grid-template-columns: 120px 1fr; }
      .thumb { width: 120px; height: 76px; border-radius: 12px; }
      .modal {
        align-items: center;
      }
      .modal-entry {
        grid-template-columns: 120px 1fr;
      }
      .modal-thumb {
        width: 120px;
        height: 76px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Anime ranking</h1>
    <div class="sub">Trykk på pilene for å flytte seriene opp eller ned. Rekkefølgen lagres automatisk på denne enheten.</div>
    <div class="toolbar">
      <button id="resetBtn" type="button">Nullstill rekkefølge</button>
    </div>
    <div id="list" class="list" aria-live="polite"></div>
  </div>

  <div id="entryModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel">
      <div class="rating-control">
        <label class="rating-label" for="ratingInput">
          Rating
          <span id="ratingValue" class="rating-value">1</span>
        </label>
        <input id="ratingInput" type="range" min="1" max="10" step="0.5" value="1" />
        <div class="range-labels" aria-hidden="true">
          <span>1</span>
          <span>10</span>
        </div>
      </div>
      <div class="modal-head">
        <div class="modal-entry">
          <div class="modal-thumb"><img id="modalImage" alt="" /></div>
          <div>
            <div id="modalRank" class="rank"></div>
            <h2 id="modalTitle"></h2>
          </div>
        </div>
        <button class="close-btn" type="button" aria-label="Close modal" data-close-modal>&times;</button>
      </div>
      <label class="note-field" for="noteInput">
        Note
        <textarea id="noteInput" placeholder="Write a note"></textarea>
      </label>
      <div class="modal-actions">
        <button id="doneBtn" class="done-btn" type="button">Done</button>
      </div>
    </div>
  </div>

    const htmlEscapes = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    };

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => htmlEscapes[char]);
    }

    function clampRating(value) {
      const fallback = Number.isFinite(value) ? value : 1;
      return Math.min(10, Math.max(1, Math.round(fallback * 2) / 2));
    }

    function formatRating(value) {
      const rating = clampRating(Number(value));
      return Number.isInteger(rating) ? String(rating) : rating.toFixed(1);
    }

    function normalizeItem(item) {
      return {
        title: item.title,
        src: item.src,
        rating: clampRating(Number(item.rating)),
        note: typeof item.note === "string" ? item.note : ""
      };
    }

    function itemHasCoreFields(item) {
      return item && typeof item.title === "string" && typeof item.src === "string";
    }

    function defaultItemsWithDetails(detailsSource = []) {
      const source = Array.isArray(detailsSource) ? detailsSource : [];
      const detailsByTitle = new Map(
        source
          .filter(item => item && typeof item.title === "string")
          .map(item => [item.title, { rating: item.rating, note: item.note }])
      );

      return defaultItems.map(defaultItem => {
        const details = detailsByTitle.get(defaultItem.title) || {};
        return normalizeItem({ ...defaultItem, ...details });
      });
    }

    function loadItems() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(saved)) return defaultItemsWithDetails();
        const validItems = saved.filter(itemHasCoreFields);
        if (validItems.length !== saved.length) return defaultItemsWithDetails(validItems);
        if (saved.length !== defaultItems.length) return defaultItemsWithDetails(saved);
        return saved.map(item => normalizeItem(item));
      } catch {
        return defaultItemsWithDetails();
      }
    }

    let items = loadItems();
    let activeIndex = null;

    const entryModal = document.getElementById("entryModal");
    const ratingInput = document.getElementById("ratingInput");
    const ratingValue = document.getElementById("ratingValue");
    const noteInput = document.getElementById("noteInput");
    const modalImage = document.getElementById("modalImage");
    const modalRank = document.getElementById("modalRank");
    const modalTitle = document.getElementById("modalTitle");

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function moveItem(index, direction) {
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= items.length) return;
      [items[index], items[newIndex]] = [items[newIndex], items[index]];
      saveItems();
      render();
      const btn = document.querySelector(`[data-index="${newIndex}"][data-dir="${direction}"]`);
      if (btn) btn.focus();
    }

    function updateRatingValue() {
      ratingValue.textContent = formatRating(ratingInput.value);
    }

    function saveEntryDetails() {
      if (activeIndex === null || !items[activeIndex]) return;
      items[activeIndex].rating = clampRating(Number(ratingInput.value));
      items[activeIndex].note = noteInput.value;
      saveItems();
    }

    function openEntryModal(index) {
      if (!items[index]) return;
      activeIndex = index;
      const item = items[index];
      ratingInput.value = formatRating(item.rating);
      noteInput.value = item.note || "";
      modalImage.src = item.src;
      modalImage.alt = item.title;
      modalRank.textContent = `#${index + 1}`;
      modalTitle.textContent = item.title;
      updateRatingValue();
      entryModal.hidden = false;
      document.body.classList.add("modal-open");
      ratingInput.focus();
    }

    function closeEntryModal() {
      if (entryModal.hidden) return;
      const focusIndex = activeIndex;
      saveEntryDetails();
      entryModal.hidden = true;
      document.body.classList.remove("modal-open");
      activeIndex = null;
      render();
      const opener = document.querySelector(`.entry-open[data-index="${focusIndex}"]`);
      if (opener) opener.focus();
    }

    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";
      items.forEach((item, index) => {
        const escapedTitle = escapeHtml(item.title);
        const escapedSrc = escapeHtml(item.src);
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
          <div class="controls">
            <button class="move-btn" type="button" aria-label="Flytt ${escapedTitle} opp" data-index="${index}" data-dir="-1" ${index === 0 ? "disabled" : ""}>▲</button>
            <button class="move-btn" type="button" aria-label="Flytt ${escapedTitle} ned" data-index="${index}" data-dir="1" ${index === items.length - 1 ? "disabled" : ""}>▼</button>
          </div>
          <button class="content entry-open" type="button" data-index="${index}" aria-label="Open ${escapedTitle}">
            <span class="thumb"><img src="${escapedSrc}" alt="${escapedTitle}" loading="eager" /></span>
            <span>
              <span class="rank">#${index + 1}</span>
              <span class="title">${escapedTitle}</span>
              <span class="hint">${index === 0 ? "Foreløpig favoritt" : index === items.length - 1 ? "Sist på lista" : "Midt på lista"}</span>
            </span>
          </button>
        `;
        list.appendChild(row);
      });

      list.querySelectorAll(".move-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          moveItem(Number(btn.dataset.index), Number(btn.dataset.dir));
        });
      });

      list.querySelectorAll(".entry-open").forEach(btn => {
        btn.addEventListener("click", () => {
          openEntryModal(Number(btn.dataset.index));
        });
      });
    }

    document.getElementById("resetBtn").addEventListener("click", () => {
      items = defaultItemsWithDetails(items);
      saveItems();
      render();
    });

    ratingInput.addEventListener("input", () => {
      updateRatingValue();
      saveEntryDetails();
    });

    noteInput.addEventListener("input", saveEntryDetails);

    entryModal.querySelectorAll("[data-close-modal]").forEach(element => {
      element.addEventListener("click", closeEntryModal);
    });

    document.getElementById("doneBtn").addEventListener("click", closeEntryModal);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !entryModal.hidden) {
        closeEntryModal();
      }
    });

    render();
  </script>
